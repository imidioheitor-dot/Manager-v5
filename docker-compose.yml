version: "3.9"

services:
  meeting-guardian:
    build: .
    container_name: meeting-guardian
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
